name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      # Note: `npm run test` is NOT in CI. Tests are real integration tests
      # (no mocks) that need Ollama + Anthropic API key + YouTube fetch +
      # OAuth fixtures. They run locally during development. The Install
      # Test (E2E) workflow exercises the real install flow on every PR,
      # which catches more meaningful regressions than unit tests would.
