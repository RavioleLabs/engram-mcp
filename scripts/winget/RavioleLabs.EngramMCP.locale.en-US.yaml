ShortDescription: Local-first semantic memory layer for AI agents (MCP server)
Description: |-
  EngramMCP is a Model Context Protocol (MCP) server that gives any AI agent
  persistent, searchable memory. It ingests from notes, conversations, Google Drive,
  Notion, YouTube, Obsidian, audio files, and custom types.

  All vectors and content stay on your machine. Embeddings run locally via Ollama
  by default — no cloud account required for basic use.

  Supports Claude Code, Cursor, and any MCP-compatible agent runtime.
